name: publish-images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tag or default branch dispatch
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != github.event.repository.default_branch }}
        shell: bash
        run: |
          echo "Manual image publishing must run from the default branch." >&2
          exit 1

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Release gates
        shell: bash
        run: |
          go test ./...
          go vet ./...
          make secret-scan

      - uses: docker/setup-buildx-action@v3

      - name: Docker smoke build
        shell: bash
        run: |
          docker build -t gongctl:release-smoke .
          docker build --target mcp -t gongmcp:release-smoke .
          docker run --rm --entrypoint /bin/sh gongctl:release-smoke -c 'test -x /usr/local/bin/gongctl && test -x /usr/local/bin/gongmcp'
          docker run --rm --entrypoint /bin/sh gongmcp:release-smoke -c 'test -x /usr/local/bin/gongmcp'

      - name: Scan gongctl image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: gongctl:release-smoke
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Scan gongmcp image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: gongmcp:release-smoke
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version="$(sed 's/^v//' VERSION)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Metadata for gongctl
        id: meta-gongctl
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/gongctl
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build and publish gongctl image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-gongctl.outputs.tags }}
          labels: ${{ steps.meta-gongctl.outputs.labels }}
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.release.outputs.date }}
          provenance: true
          sbom: true

      - name: Metadata for gongmcp
        id: meta-gongmcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/gongmcp
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build and publish gongmcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: mcp
          push: true
          tags: ${{ steps.meta-gongmcp.outputs.tags }}
          labels: ${{ steps.meta-gongmcp.outputs.labels }}
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.release.outputs.date }}
          provenance: true
          sbom: true
