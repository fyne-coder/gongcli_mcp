# Example EKS IRSA wiring for gongmcp-gateway DCR mode.
# Replace placeholders before applying. Do not commit real account IDs or ARNs.
#
# 1. Create an IAM role trusted by your EKS OIDC provider.
# 2. Attach deploy/remote-mcp-auth/aws-cognito-gateway/iam/dcr-gateway-policy.json
#    to the gateway role.
# 3. Keep dcr-cleanup-policy.json on a separate operator role.
# 4. Apply this ServiceAccount, then set spec.serviceAccountName on the gateway
#    Deployment.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gongmcp-gateway
  namespace: gongctl-postgres-pilot
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/gongmcp-gateway-dcr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gongmcp-gateway
  namespace: gongctl-postgres-pilot
spec:
  template:
    spec:
      serviceAccountName: gongmcp-gateway
      containers:
        - name: gongmcp-gateway
          env:
            - name: AWS_REGION
              value: <AWS_REGION>
            # EKS Pod Identity uses a different controller/association path.
            # If the cluster uses Pod Identity instead of IRSA, follow the
            # customer's EKS Pod Identity docs and omit the role annotation above.
