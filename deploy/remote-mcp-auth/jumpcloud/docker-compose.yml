version: "3.8"

services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "${HTTP_BIND:-127.0.0.1:8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - oauth2-proxy
      - shim

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --oidc-issuer-url=${JUMPCLOUD_OIDC_ISSUER_URL:?set JUMPCLOUD_OIDC_ISSUER_URL}
      - --client-id=${JUMPCLOUD_OIDC_CLIENT_ID:?set JUMPCLOUD_OIDC_CLIENT_ID}
      - --client-secret=${JUMPCLOUD_OIDC_CLIENT_SECRET:?set JUMPCLOUD_OIDC_CLIENT_SECRET}
      - --redirect-url=${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}/oauth2/callback
      - --email-domain=*
      - --upstream=http://shim:8090
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-authorization-header=true
      - --pass-access-token=true
      - --skip-jwt-bearer-tokens=true
      - --cookie-secure=true
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:?set OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-samesite=lax
    depends_on:
      - shim

  shim:
    build:
      context: ../../lab-auth/shim
    image: gongctl-remote-auth-shim:local
    restart: unless-stopped
    environment:
      UPSTREAM_URL: http://gongmcp:8080
      INTERNAL_BEARER_TOKEN_FILE: /run/secrets/gongmcp_token
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}
      OIDC_ISSUER_URL: ${JUMPCLOUD_OIDC_ISSUER_URL:?set JUMPCLOUD_OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${JUMPCLOUD_OIDC_CLIENT_ID:?set JUMPCLOUD_OIDC_CLIENT_ID}
      REQUIRED_GROUP: ${JUMPCLOUD_REQUIRED_GROUP:-}
      ALLOWED_EMAILS: ${PILOT_ALLOWED_EMAILS:?set PILOT_ALLOWED_EMAILS}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-0}
      TRUST_PROXY_CIDRS: ${TRUST_PROXY_CIDRS:-}
    volumes:
      - ${GONGMCP_BEARER_TOKEN_FILE:?set GONGMCP_BEARER_TOKEN_FILE}:/run/secrets/gongmcp_token:ro
    depends_on:
      - gongmcp

  gongmcp:
    image: ${GONGMCP_IMAGE:-ghcr.io/fyne-coder/gongcli_mcp/gongmcp:v0.5.5}
    restart: unless-stopped
    # SQLite file-mounted starter. For Postgres, remove --db and GONGMCP_DB,
    # then set GONG_DATABASE_URL or DATABASE_URL on this service.
    environment:
      GONGMCP_BEARER_TOKEN_FILE: /run/secrets/gongmcp_token
      GONGMCP_TOOL_PRESET: ${GONGMCP_TOOL_PRESET:-business-pilot}
      GONGMCP_ALLOWED_ORIGINS: ${GONGMCP_ALLOWED_ORIGINS:?set GONGMCP_ALLOWED_ORIGINS}
    command:
      - --http
      - 0.0.0.0:8080
      - --auth-mode
      - bearer
      - --allow-open-network
      - --db
      - /data/gong.db
    volumes:
      - ${GONGMCP_DB:?set GONGMCP_DB}:/data/gong.db:ro
      - ${GONGMCP_BEARER_TOKEN_FILE:?set GONGMCP_BEARER_TOKEN_FILE}:/run/secrets/gongmcp_token:ro
