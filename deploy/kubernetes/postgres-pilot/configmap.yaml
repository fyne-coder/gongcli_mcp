  GONGMCP_READER_ROLE: gongmcp_business_workbench_reader
  GONGMCP_DATABASE_NAME: gongctl_mcp
  GONGMCP_POSTGRES_REDACTED_SERVING_DB: "1"
  GONGMCP_ENFORCE_TOOL_SCOPED_DB_GRANTS: "1"
