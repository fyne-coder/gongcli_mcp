apiVersion: v1
kind: ConfigMap
metadata:
  name: gongctl-postgres-pilot-config
data:
  GONGMCP_TOOL_PRESET: business-workbench
  GONGMCP_READER_ROLE: gongmcp_business_workbench_reader
  GONGMCP_DATABASE_NAME: gongctl_mcp
  GONGMCP_POSTGRES_REDACTED_SERVING_DB: "1"
  GONGMCP_ENFORCE_TOOL_SCOPED_DB_GRANTS: "1"
  GONGMCP_ALLOWED_ORIGINS: https://mcp.customer.example.com
  GONGCTL_DEPLOY_SMOKE_MAX_MARKER_AGE: 24h
  PUBLIC_BASE_URL: https://mcp.customer.example.com
  GATEWAY_UPSTREAM_URL: http://gongmcp:8080
  GATEWAY_ADDR: :8090
  OIDC_AUTH_PROFILE: direct-oidc
  OIDC_ISSUER_URL: https://issuer.customer.example.com
  OIDC_REQUIRED_SCOPE: gongmcp/read
  OIDC_SCOPES_SUPPORTED: gongmcp/read
  # Use one or more dedicated MCP groups. For multiple groups, replace
  # OIDC_REQUIRED_GROUP with OIDC_REQUIRED_GROUPS: GroupA,GroupB. For
  # JumpCloud/Ory-shaped tokens, verify the group claim is in the access token.
  OIDC_REQUIRED_GROUP: GongMCP-Users
  OIDC_GROUP_CLAIM: groups
  GATEWAY_DCR_ENABLED: "0"
  GATEWAY_ALLOWED_ORIGINS: https://claude.ai
