apiVersion: batch/v1
kind: CronJob
metadata:
  name: gongctl-postgres-refresh
spec:
  schedule: "17 */6 * * *"
  concurrencyPolicy: Forbid
  suspend: true
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
          containers:
            - name: gongctl
              image: ghcr.io/fyne-coder/gongcli_mcp/gongctl:vX.Y.Z
              imagePullPolicy: IfNotPresent
              command:
                - /usr/local/bin/gongctl
              args:
                - deploy
                - postgres-refresh
                - --preset
                - $(GONGMCP_TOOL_PRESET)
                - --role
                - $(GONGMCP_READER_ROLE)
                - --database
                - $(GONGMCP_DATABASE_NAME)
              envFrom:
                - configMapRef:
                    name: gongctl-postgres-pilot-config
              env:
                - name: GONG_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gongctl-postgres-pilot-secrets
                      key: GONG_ACCESS_KEY
                - name: GONG_ACCESS_KEY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: gongctl-postgres-pilot-secrets
                      key: GONG_ACCESS_KEY_SECRET
                - name: GONGCTL_SOURCE_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: gongctl-postgres-pilot-secrets
                      key: GONGCTL_SOURCE_DATABASE_URL
                - name: GONGCTL_MCP_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: gongctl-postgres-pilot-secrets
                      key: GONGCTL_MCP_DATABASE_URL
                - name: GONGCTL_AI_GOVERNANCE_CONFIG
                  value: /run/secrets/ai-governance.yaml
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
              volumeMounts:
                - name: governance-config
                  mountPath: /run/secrets/ai-governance.yaml
                  subPath: ai-governance.yaml
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          volumes:
            - name: governance-config
              secret:
                secretName: gongctl-postgres-pilot-secrets
                items:
                  - key: ai-governance.yaml
                    path: ai-governance.yaml
