apiVersion: apps/v1
kind: Deployment
metadata:
  name: gongmcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gongmcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gongmcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: gongmcp
          image: ghcr.io/fyne-coder/gongcli_mcp/gongmcp:vX.Y.Z
          imagePullPolicy: IfNotPresent
          args:
            - --http
            - 0.0.0.0:8080
            - --auth-mode
            - bearer
            - --allow-open-network
          envFrom:
            - configMapRef:
                name: gongctl-postgres-pilot-config
          env:
            - name: GONG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gongctl-postgres-pilot-secrets
                  key: GONGMCP_ANALYST_READER_URL
            - name: GONGMCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gongctl-postgres-pilot-secrets
                  key: GONGMCP_BEARER_TOKEN
            # Omit GONGMCP_AI_GOVERNANCE_CONFIG and the governance volume when no
            # customer exclusions exist; set GONGMCP_NO_GOVERNANCE_EXCLUSIONS=1 instead.
            - name: GONGMCP_AI_GOVERNANCE_CONFIG
              value: /run/secrets/ai-governance.yaml
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: governance-config
              mountPath: /run/secrets/ai-governance.yaml
              subPath: ai-governance.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: governance-config
          secret:
            secretName: gongctl-postgres-pilot-secrets
            items:
              - key: ai-governance.yaml
                path: ai-governance.yaml
