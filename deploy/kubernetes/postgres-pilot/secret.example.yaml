# Placeholder shape only. Do not apply this file directly and do not add it to
# kustomization.yaml; create the real Secret through the customer's secret path.
apiVersion: v1
kind: Secret
metadata:
  name: gongctl-postgres-pilot-secrets
type: Opaque
stringData:
  GONG_ACCESS_KEY: replace-with-customer-secret
  GONG_ACCESS_KEY_SECRET: <set-gong-secret>
  GONGCTL_SOURCE_DATABASE_URL: postgres://source-writer:replace@postgres.example.com:5432/gongctl_source?sslmode=require
  GONGCTL_MCP_DATABASE_URL: postgres://serving-writer:replace@postgres.example.com:5432/gongctl_mcp?sslmode=require
  GONGMCP_ANALYST_READER_URL: postgres://gongmcp_business_workbench_reader:replace@postgres.example.com:5432/gongctl_mcp?sslmode=require
  GONGMCP_BEARER_TOKEN: replace-with-customer-managed-token
  OIDC_CLIENT_ID: replace-with-dedicated-claude-app-client-id
  # Real pilots with customer exclusions should mount a private ai-governance.yaml
  # via --from-file=ai-governance.yaml=/secure/path/ai-governance.yaml .
  # When no customer exclusions exist, do not use an empty customers list here;
  # that YAML is rejected. Use deploy/gongmcp --no-governance-exclusions instead.
