version: "3.8"

services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - keycloak
      - oauth2-proxy
      - shim

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --hostname-strict=false
      - --proxy-headers=xforwarded
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${LAB_PUBLIC_BASE_URL:?set LAB_PUBLIC_BASE_URL}
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --provider=keycloak-oidc
      - --oidc-issuer-url=${LAB_PUBLIC_BASE_URL:?set LAB_PUBLIC_BASE_URL}/realms/gong-lab
      - --client-id=gong-lab-proxy
      - --client-secret=${OIDC_CLIENT_SECRET:?set OIDC_CLIENT_SECRET}
      - --redirect-url=${LAB_PUBLIC_BASE_URL}/oauth2/callback
      - --email-domain=*
      - --allowed-group=/gong-mcp-users
      - --upstream=http://shim:8090
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-authorization-header=true
      - --pass-access-token=true
      - --skip-jwt-bearer-tokens=true
      - --cookie-secure=false
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:?set OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-samesite=lax
    depends_on:
      - keycloak
      - shim

  shim:
    build:
      context: ./shim
    image: gongctl-lab-auth-shim:local
    restart: unless-stopped
    environment:
      UPSTREAM_URL: http://gongmcp:8080
      INTERNAL_BEARER_TOKEN_FILE: /run/secrets/gongmcp_token
      PUBLIC_BASE_URL: ${LAB_PUBLIC_BASE_URL:?set LAB_PUBLIC_BASE_URL}
      OIDC_ISSUER_URL: ${LAB_PUBLIC_BASE_URL}/realms/gong-lab
      OIDC_CLIENT_ID: gong-lab-proxy
      REQUIRED_GROUP: /gong-mcp-users
      ALLOWED_EMAILS: ${LAB_ALLOWED_EMAILS:?set LAB_ALLOWED_EMAILS}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-0}
      TRUST_PROXY_CIDRS: ${TRUST_PROXY_CIDRS:-}
    volumes:
      - ${REMOTE_ROOT:?set REMOTE_ROOT}/secrets/gongmcp_token:/run/secrets/gongmcp_token:ro
    depends_on:
      - gongmcp

  gongmcp:
    image: ${LAB_GONGMCP_IMAGE:-gongctl:mcp-local}
    restart: unless-stopped
    environment:
      GONG_DATABASE_URL: ${GONG_DATABASE_URL:-}
      GONGMCP_BEARER_TOKEN_FILE: /run/secrets/gongmcp_token
      GONGMCP_TOOL_PRESET: ${GONGMCP_TOOL_PRESET:-business-pilot}
      GONGMCP_DEPLOYMENT_ID: ${GONGMCP_DEPLOYMENT_ID:-}
      GONGMCP_TRANSCRIPT_EVIDENCE_PROVENANCE: ${GONGMCP_TRANSCRIPT_EVIDENCE_PROVENANCE:-redacted}
      GONGMCP_POLICY_SWITCHES: ${GONGMCP_POLICY_SWITCHES:-}
      GONGMCP_ENFORCE_TOOL_SCOPED_DB_GRANTS: ${GONGMCP_ENFORCE_TOOL_SCOPED_DB_GRANTS:-}
      GONGMCP_POSTGRES_REDACTED_SERVING_DB: ${GONGMCP_POSTGRES_REDACTED_SERVING_DB:-}
      GONGMCP_AI_GOVERNANCE_CONFIG: ${GONGMCP_AI_GOVERNANCE_CONFIG:-}
      GONGMCP_ALLOWED_ORIGINS: ${LAB_PUBLIC_BASE_URL}
    entrypoint:
      - /bin/sh
    command:
      - -ec
      - |
        if [ -n "$${GONG_DATABASE_URL:-}" ]; then
          exec /usr/local/bin/gongmcp --http 0.0.0.0:8080 --auth-mode bearer --allow-open-network
        else
          exec /usr/local/bin/gongmcp --http 0.0.0.0:8080 --auth-mode bearer --allow-open-network --db /data/gong.db
        fi
    volumes:
      - ${REMOTE_ROOT:?set REMOTE_ROOT}/runtime/gong-mcp-governed.db:/data/gong.db:ro
      - ${REMOTE_ROOT:?set REMOTE_ROOT}/secrets/gongmcp_token:/run/secrets/gongmcp_token:ro
      - ${GONGMCP_AI_GOVERNANCE_CONFIG_MOUNT:?set GONGMCP_AI_GOVERNANCE_CONFIG_MOUNT}:/run/secrets/ai-governance.yaml:ro

volumes:
  keycloak-data:
